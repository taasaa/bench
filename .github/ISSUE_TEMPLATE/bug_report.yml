name: Bug Report
description: Report something that isn't working as expected
labels: bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the template below.
  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: e.g. 3.10, 3.11, 3.12
      placeholder: 3.10
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: e.g. macOS 14, Ubuntu 22.04, Windows 11
      placeholder: macOS 14
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Be specific. Include the exact command you ran.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any error output or logs here.